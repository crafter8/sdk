name: SDK CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sdk-test-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Verify package tests
        run: npm test

      - name: Verify package packability
        run: npm pack --dry-run
