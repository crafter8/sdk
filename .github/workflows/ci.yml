name: SDK CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sdk-test-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Verify package tests
        run: npm test

      - name: Verify package packability
        run: npm pack --dry-run
